<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>RECEB SHOP</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    .top {
      padding: 20px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      background: #5865F2;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      color: red;
      font-size: 40px;
      letter-spacing: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
    }

    .card h3 {
      color: gold;
    }
  </style>
</head>

<body>

  <div class="top">
    <div>DISCORD SHOP</div>
    <a class="btn" href="https://discord.com" target="_blank">JOIN SERVER</a>
  </div>

  <div class="hero">
    <h1>RECEB SHOP</h1>
    <p>Shop game - private tools - generator</p>
  </div>

  <div class="grid">
    <div class="card">
      <h3>GAME PASS</h3>
      <p>Buy items / pass / account</p>
    </div>

    <div class="card">
      <h3>PRIVATE TOOL</h3>
      <p>Tools / scripts / features</p>
    </div>

    <div class="card">
      <h3>SUPPORT</h3>
      <p>24/7 support via Discord</p>
    </div>
  </div>

</body>
</html>
