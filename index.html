<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faker Game</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#111,#1f1f1f);
      font-family:Arial,sans-serif;
      overflow:hidden;
    }

    .box{
      background:rgba(255,255,255,0.08);
      padding:40px;
      border-radius:20px;
      text-align:center;
      backdrop-filter:blur(10px);
      box-shadow:0 0 20px rgba(0,0,0,0.5);
      width:320px;
    }

    h1{
      color:white;
      margin-bottom:25px;
      font-size:38px;
    }

    .btn{
      display:block;
      width:100%;
      padding:15px;
      margin:12px 0;
      border:none;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      transition:0.25s;
      text-decoration:none;
      color:white;
      font-weight:bold;
    }

    .roblox{
      background:#00b06f;
    }

    .discord{
      background:#5865F2;
    }

    .btn:hover{
      transform:scale(1.05);
      opacity:0.9;
    }

    p{
      color:#ccc;
      margin-top:20px;
      font-size:14px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Faker Game</h1>

    <a class="btn roblox" href="LINK_ROBLOX" target="_blank">
      🎮 Play Roblox Game
    </a>

    <a class="btn discord" href="LINK_DISCORD" target="_blank">
      💬 Join Discord Server
    </a>

    <p>Official Website</p>
  </div>

</body>
</html>
